name: Passing Variables Between jobs
on:
  workflow_dispatch:

jobs:
  producer:
    runs-on: ubuntu-24.04

    outputs:
      foo: ${{ steps.generate-foo.outputs.foo }}
    steps:
      - name: Generate and export foo
        id: generate-foo
        run: |
          foo=bar

          # 1) Step output (for job output)
          echo "foo=${foo}" >> "$GITHUB_OUTPUT"

          # 2) Job-scoped environment variable
          echo "FOO=${foo}" >> "$GITHUB_ENV"

      - name: Inspect values inside producer
        run: |
          echo "foo (step output):          ${{ steps.generate-foo.outputs.foo }}"
          echo "FOO (set via GITHUB_ENV):   $FOO"

  consumer:
    runs-on: ubuntu-24.04
    needs: producer
    steps:
      - name: Inspect values inside consumer (note FOO is unset)
        run: |
          FOO=BAR
          echo "FOO=${FOO}" >> "$GITHUB_ENV"
          echo "Value from producer:        ${{ needs.producer.outputs.foo }}"
          echo "FOO in consumer:            $FOO"
  
  teacher:
    runs-on: ubuntu-latest
    
    outputs:
      course_completed: ${{ steps.complete-course-and-share-result.outputs.course_completed }}
      result: ${{ steps.complete-course-and-share-result.outputs.result }}

    steps:
      - name: Completing the course and sharing the result
        id: complete-course-and-share-result
        run: |
          #variable declarations
          course_completed=true
          result=false

          #OUTPUTS
          echo "course_completed=true" >> "$GITHUB_OUTPUT"
          echo "result=false" >> "$GITHUB_OUTPUT"

          #ENVIRONMENT_VARIABLES
          echo "COURSE_COMPLETED=true" >> "$GITHUB_ENV"
          echo "RESULT=false" >> "$GITHUB_ENV"

          #INSPECTING VALUES - ENVIRONMENT_VARIABLES
          echo "Course completed (step output): $COURSE_COMPLETED"
          echo "Result (step output):           $RESULT"
          
          #INSPECTING VALUES - OUTPUTS
          echo "Course completed (step output): ${{ steps.complete-course-and-share-result.outputs.course_completed }}"
          echo "Result (step output):           ${{ steps.complete-course-and-share-result.outputs.result }}"

  student:
    runs-on: ubuntu-latest
    needs: teacher
    steps:
      - name: Renouncing the results shared by teacher
        run: |
          #VARIABLES DECLARATION IN STUDENT JOB
          COURSE_COMPLETED=false
          RESULT=false

          #Via OUTPUTS
          echo "Course completed (from teacher's output): ${{ needs.teacher.outputs.course_completed }}"
          echo "Result (from teacher's output):           ${{ needs.teacher.outputs.result }}"

          #Via ENVIRONMENT_VARIABLES
          echo "Course completed (from student): ${COURSE_COMPLETED:-<UNSET>}"
          echo "Result (from student):           ${RESULT:-<UNSET>}"