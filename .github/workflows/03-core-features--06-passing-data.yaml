name: Passing Variables Between jobs
on:
  workflow_dispatch:

jobs:
  producer:
    runs-on: ubuntu-24.04

    outputs:
      pi: ${{ steps.generate-pi.outputs.pi }}
    steps:
      - name: Generate and export pi
        id: generate-pi
        run: |
          pi=threepointonefour

          # 1) Step output (for job output)
          echo "pi=${pi}" >> "$GITHUB_OUTPUT"

          # 2) Job-scoped environment variable
          echo "PI=${pi}" >> "$GITHUB_ENV"

      - name: Inspect values inside producer
        run: |
          echo "PI (set via GITHUB_ENV):   $PI"
          echo "pi (step output):          ${{ steps.generate-pi.outputs.pi }}"

  consumer:
    runs-on: ubuntu-24.04
    needs: producer
    steps:
      - name: Inspect values inside consumer (note pi is unset)
        run: |
          pi = THREEPOINTONEFOUR

          echo "pi=$pi"  # (local variable in consumer, not set by producer) not set by producer, just a local variable here
          echo "Value from producer:        ${{ needs.producer.outputs.pi }}"
          echo "pi in consumer:            $pi"
